<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty</title>
    <link rel="icon" href="src/assets/icon.svg" type="image/icon">
    <link rel="stylesheet" href="style.css">
    <script src="src/main.js" type="module"></script>
</head>
<body>
    <header>
        <div id="logo-titulo">
            <img src="src/assets/icon.svg" alt="Ícone do site">
            <h1>Rick and Morty Explorer</h1>
        </div>

        <p id="data-hora-header">Carregando...</p>
    </header>

    <div id="container-principal">
        <aside>
            <form>
                <div id="busca">
                    <label for="busca">Busca</label>
                    <input type="text" name="name" id="campo-busca" class="campo-filtro" placeholder="Buscar por nome...">
                </div>
                <div id="filtros">
                    <label for="status">Filtros</label>
                    <select name="status" id="status" class="campo-filtro">
                        <option value="">Todos os status</option>
                        <option value="alive">Alive</option>
                        <option value="dead">Dead</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <select name="species" id="especies" class="campo-filtro">
                        <option value="">Todas as espécies</option>
                        <option value="alien">Alien</option>
                        <option value="animal">Animal</option>
                        <option value="cronenberg">Cronenberg</option>
                        <option value="disease">Disease</option>
                        <option value="human">Human</option>
                        <option value="humanoid">Humanoid</option>
                        <option value="mythological creature">Mythological Creature</option>
                        <option value="poopybutthole">Poopybutthole</option>
                        <option value="robot">Robot</option>
                        <option value="unknown">Unknown</option>
                    </select>
                
                    <select name="gender" id="generos" class="campo-filtro">
                        <option value="">Todos os gêneros</option>
                        <option value="female">Female</option>
                        <option value="genderless">Genderless</option>
                        <option value="male">Male</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <button id="botao-limpar-filtros">Limpar filtros</button>
                </div>
            </form>
        </aside>

        <main>
            <img src="https://i.giphy.com/i2tLw5ZyikSFdkeGHT.webp" alt="" style="display: none;">
            <p id="paginas"></p>
            <button id="pagina-anterior">Página anterior</button>
            <button id="proxima-pagina">Próxima página</button>
            <ul id="galeria-personagens"></ul>
        </main>
    </div>

    <dialog id="modal-personagem"></dialog>
</body>
</html>
